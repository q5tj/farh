kind = "mobile"
previewPath = "/"
title = "فرح - تنظيم الحفلات"
version = "1.0.0"
id = "artifacts/farah"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21471

[services.development]
run = "pnpm --filter @workspace/farah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farah", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/farah", "run", "serve" ]

[services.env]
PORT = "21471"
BASE_PATH = "/"
